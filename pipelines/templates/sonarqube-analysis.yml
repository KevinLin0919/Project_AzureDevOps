steps:
- task: SonarCloudPrepare@4
  inputs:
    SonarCloud: '$(sonarConnectionName)'
    organization: '$(sonarOrganization)'
    scannerMode: 'cli'
    configMode: 'manual'
    cliProjectKey: '$(sonarProjectKey)'
    cliProjectName: '$(sonarProjectName)'
    cliSources: 'asgards'
    extraProperties: |
      sonar.python.version=3.11
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/junit/test-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
  displayName: 'Prepare SonarCloud'

- task: SonarCloudAnalyze@4
  displayName: 'Run SonarCloud Analysis'

- task: SonarCloudPublish@4
  inputs:
    pollingTimeoutSec: '300'
  displayName: 'Publish SonarCloud Results'