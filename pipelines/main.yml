trigger:
  batch: true
  branches:
    include:
    - main
    - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  sonarConnectionName: 'sonarqube-server'
  sonarProjectKey: 'Project_AzureDevops'

stages:
- stage: Build
  displayName: 'Build and Validation'
  jobs:
  - job: Validate
    displayName: 'Lint and Test'
    steps:
    - template: templates/install-deps.yml
    - template: templates/run-tests.yml

- stage: Analyze
  displayName: 'Quality Analysis'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: SonarQube
    displayName: 'SonarQube Scan'
    steps:
    - template: templates/install-deps.yml
    - template: templates/sonarqube-analysis.yml
